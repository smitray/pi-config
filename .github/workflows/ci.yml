name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: extensions/package-lock.json
      - run: npm ci
        working-directory: extensions
      - run: npm test
        working-directory: extensions
      - run: npm run lint
        working-directory: extensions
